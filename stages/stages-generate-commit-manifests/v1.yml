parameters:
  - name: environmentName
    type: string
  - name: helmfileDirectory
    default: "./"
    type: string
  - name: argoRepoName
    type: string
  - name: argoBaseDir
    type: string
    default: apps
  - name: pregenerateSteps
    type: stepList
    default: []
  - name: "helmfileVersion"
    type: string
    default: "0.162.0"

  # Stage wiring for callers composing multiple stages of this template in
  # one pipeline (e.g. a combined test -> stage -> production deploy with a
  # runtime condition gating whether stage/production even queue). Omitted
  # by default so existing single-stage-per-call consumers keep Azure
  # Pipelines' implicit "depends on the previous stage in the file"
  # behavior unchanged -- passing a non-empty dependsOn is what opts a
  # caller into explicit wiring.
  - name: dependsOn
    type: object
    default: []
  - name: condition
    type: string
    default: succeeded()

  # Pool selection: set vmImage to run on a Microsoft-hosted agent (e.g.
  # "ubuntu-latest"); leave it empty (the default) to use the self-hosted
  # poolName pool instead. vmImage takes precedence when both are set.
  - name: poolName
    type: string
    default: Default
  - name: vmImage
    type: string
    default: ""

stages:
  - stage: generate_commit_manifest_${{ parameters.environmentName }}
    displayName: Deploy To ${{ parameters.environmentName }} Environment
    ${{ if gt(length(parameters.dependsOn), 0) }}:
      dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    jobs:
      - deployment: deploy_marker_${{ parameters.environmentName }}
        displayName: Deployment Step
        environment: ${{ parameters.environmentName }}
        pool:
          ${{ if ne(parameters.vmImage, '') }}:
            vmImage: ${{ parameters.vmImage }}
          ${{ else }}:
            name: ${{ parameters.poolName }}
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying to ${{ parameters.environmentName }}"
      - job: generate_manifests_${{ parameters.environmentName }}
        pool:
          ${{ if ne(parameters.vmImage, '') }}:
            vmImage: ${{ parameters.vmImage }}
          ${{ else }}:
            name: ${{ parameters.poolName }}
        steps:
          - checkout: self
            clean: true
            persistCredentials: true
          - template: ../../step_collections/helmfile-template/v1.yml
            parameters:
              environmentName: "${{ parameters.environmentName }}"
              helmfileDirectory: "${{ parameters.helmfileDirectory }}"
              pregenerateSteps: ${{ parameters.pregenerateSteps }}
              helmfileVersion: ${{ parameters.helmfileVersion }}
      # Waits on deploy_marker (the environment-bound deployment job) as well
      # as generate_manifests -- deploy_marker is where an Environment's
      # approval checks actually pause the run. Without this dependency, an
      # approval check on environmentName would be purely decorative: this
      # job (the one that actually commits rendered manifests, which is what
      # triggers Argo to sync) would run in parallel with deploy_marker and
      # complete regardless of whether the check had been approved yet.
      - job: commit_changes_${{ parameters.environmentName }}
        dependsOn:
          - generate_manifests_${{ parameters.environmentName }}
          - deploy_marker_${{ parameters.environmentName }}
        pool:
          ${{ if ne(parameters.vmImage, '') }}:
            vmImage: ${{ parameters.vmImage }}
          ${{ else }}:
            name: ${{ parameters.poolName }}
        steps:
          - template: ../../step_collections/commit-to-gitops-repo/v1.yml@templates
            parameters:
              repositoryResource: "${{ parameters.argoRepoName }}"
              artifactName: "${{ parameters.environmentName }}"
              commitMessage: "${{ parameters.environmentName }} - Update $(Build.BuildNumber)"
              argoBaseDir: "${{ parameters.argoBaseDir }}"
