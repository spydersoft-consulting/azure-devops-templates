parameters:
  - name: repositoryResource
    type: string
  - name: branchName
    type: string
    default: refs/heads/main
  # Should be something like tokenservice=1.1.1,datamanager=3.3.3
  - name: tagsCollection
    type: string
  - name: commitMessage
    type: string

steps:
  - checkout: ${{ parameters.repositoryResource }}
    clean: true
    persistCredentials: true
    fetchDepth: 0
  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.x"
  - script: |
      cd scripts
      pip3 install -r requirements.txt
    displayName: Install Requirements for YAML editor

  - script: |
      git config --global user.email "gerega@gmail.com"
      git config --global user.name "CI/CD User"

    displayName: Configure Git User
  - task: PowerShell@2
    displayName: Run Process-CICD Script in Helmconfig
    inputs:
      targetType: "filePath" # Optional. Options: filePath, inline
      filePath: scripts/process-cicd.ps1 # Required when targetType == FilePath
      # Pass tagsCollection through as a single quoted string and let
      # process-cicd.ps1 split it on commas itself. Azure Pipelines template
      # expressions have no string-replace function, so a previous attempt
      # to space-join it at this layer (${{ replace(...) }}) silently didn't
      # work -- and splitting unquoted on the CLI relies on whitespace
      # inside a raw comma-joined string, which isn't there. Quoting the
      # whole string and splitting in PowerShell avoids both problems.
      arguments: -branchName "${{ parameters.branchName }}" -tagsCollection "${{ parameters.tagsCollection }}" -message "${{ parameters.commitMessage }}" # Optional
