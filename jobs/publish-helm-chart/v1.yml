parameters:
  - name: chartName
    type: string
  - name: chartPath
    type: string
  - name: chartVersion
    type: string
  - name: ociRegistry
    type: string
    default: ghcr.io/spydersoft-consulting/charts
  - name: containerRegistryName
    type: string
  # Job identity - override these when invoking this job more than once
  # within the same stage (e.g. publishing several charts side by side).
  - name: jobName
    type: string
    default: publish_helm_chart
  - name: jobDisplayName
    type: string
    default: Publish Helm Chart

jobs:
  - job: ${{ parameters.jobName }}
    displayName: ${{ parameters.jobDisplayName }}
    pool:
      name: Default
    steps:
      - checkout: self
        clean: true
      - task: Docker@2
        displayName: Login to Container Registry
        inputs:
          command: login
          containerRegistry: ${{ parameters.containerRegistryName }}
      - script: |
          helm dependency update ${{ parameters.chartPath }}
        displayName: Update Chart Dependencies
      - script: |
          helm package ${{ parameters.chartPath }} \
            --version ${{ parameters.chartVersion }} \
            --app-version ${{ parameters.chartVersion }} \
            --destination $(Build.ArtifactStagingDirectory)
        displayName: Package Chart
      - script: |
          helm push "$(Build.ArtifactStagingDirectory)/${{ parameters.chartName }}-${{ parameters.chartVersion }}.tgz" oci://${{ parameters.ociRegistry }}
        displayName: Push Chart to OCI Registry
