parameters:
  - name: dockerImageName
    type: string
  - name: containerRegistryName
    type: string
  - name: artifactName
    type: string
  - name: artifactZipName
    type: string
  - name: dockerFilePath
    type: string
    default: $(Build.SourcesDirectory)/Dockerfile.simple
  - name: dockerBuildBasePath
    type: string
    default: $(Pipeline.Workspace)/dockerFiles
  - name: artifactTargetPath
    type: string
    default: ""
  - name: prebuildSteps
    type: stepList
    default: []
  # Job identity - override these when invoking this job more than once
  # within the same stage (e.g. building several images side by side).
  - name: jobName
    type: string
    default: create_docker_image_and_publish
  - name: jobDisplayName
    type: string
    default: Create Docker Image and Publish
  # Pool selection: set vmImage to run on a Microsoft-hosted agent (e.g.
  # "ubuntu-latest"); leave it empty (the default) to use the self-hosted
  # poolName pool instead. vmImage takes precedence when both are set.
  - name: poolName
    type: string
    default: Default
  - name: vmImage
    type: string
    default: ""
jobs:
  - job: ${{ parameters.jobName }}
    displayName: ${{ parameters.jobDisplayName }}
    pool:
      ${{ if ne(parameters.vmImage, '') }}:
        vmImage: ${{ parameters.vmImage }}
      ${{ else }}:
        name: ${{ parameters.poolName }}
    steps:
      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: "current"
          artifactName: "${{ parameters.artifactName }}"
          targetPath: "$(Pipeline.Workspace)/${{ parameters.artifactName }}"
      - task: ExtractFiles@1
        displayName: Extract Build Files
        inputs:
          archiveFilePatterns: "$(Pipeline.Workspace)/${{ parameters.artifactName }}/${{ parameters.artifactZipName }}.zip"
          destinationFolder: ${{ parameters.dockerBuildBasePath }}/${{ parameters.artifactTargetPath }}
          cleanDestinationFolder: true
      - task: Bash@3
        displayName: Copy Docker file to build folder
        inputs:
          targetType: "inline"
          script: |
            cp ${{ parameters.dockerFilePath }} ${{ parameters.dockerBuildBasePath }}/Dockerfile
      - ${{ parameters.prebuildSteps }}
      - task: Docker@2
        displayName: Build Image
        inputs:
          command: "build"
          containerRegistry: ${{ parameters.containerRegistryName }}
          repository: ${{ parameters.dockerImageName }}
          Dockerfile: "${{ parameters.dockerBuildBasePath }}/Dockerfile"
          buildContext: "${{ parameters.dockerBuildBasePath }}"
          tags: |
            $(build.buildnumber)

      - task: Docker@2
        displayName: Push to Container Registry
        inputs:
          containerRegistry: ${{ parameters.containerRegistryName}}
          repository: "${{ parameters.dockerImageName}}"
          command: "push"
          tags: |
            $(build.buildnumber)
