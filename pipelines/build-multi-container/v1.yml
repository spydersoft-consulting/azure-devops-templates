parameters:
  # Gitversion
  - name: gitVersionSpec
    type: string
    default: "6.0.x"

  # .NET Build Parameters
  - name: buildProject
    type: string
    default: "**/*.slnx"
  - name: netCoreVersion
    type: string
    default: "8.0.x"
  - name: buildConfiguration
    type: string
    default: Release
  - name: externalFeedCredentials
    type: string
    default: "SpydersoftDevelop"

  # List of .NET projects to publish as deployable artifacts.
  # Each entry: { name, project, artifactName }
  - name: publishProjects
    type: object
    default: []

  # NuGet Pack / Publish (optional)
  # Set publishToNuget: true to pack and push NuGet packages from the same
  # build job. The pack runs --no-build so it reuses the solution build above.
  - name: publishToNuget
    type: boolean
    default: false
  - name: projectsToPack
    type: string
    default: ""
  - name: externalPublishUrl
    type: string
    default: ""
  - name: externalPublishApiKey
    type: string
    default: ""

  # .NET Test Settings
  - name: executeTests
    type: boolean
    default: false
  - name: testProjects
    type: string
    default: "**/*tests/*.csproj"

  # .NET Sonarqube Settings (one project covering all C# in the solution)
  - name: executeSonar
    type: boolean
    default: false
  - name: sonarEndpointName
    type: string
    default: ""
  - name: sonarProjectKey
    type: string
    default: ""
  - name: sonarProjectName
    type: string
    default: ""
  - name: useSonarCloud
    type: boolean
    default: false
  - name: sonarCloudOrganization
    type: string
    default: ""
  - name: sonarExtraProperties
    type: string
    default: ""

  # UI Build (optional - set uiEnabled: true to include the yarn build/scan)
  - name: uiEnabled
    type: boolean
    default: false
  - name: uiSourceDirectory
    type: string
    default: "src/ui"
  - name: uiNodeVersion
    type: string
    default: "22.x"
  - name: uiUseYarn2
    type: boolean
    default: true
  - name: uiCodeCoverageFile
    type: string
    default: "output/coverage/cobertura-coverage.xml"
  - name: uiUnitTestFile
    type: string
    default: "output/test/junit.xml"

  # UI Sonarqube Settings (one project for the JS/TS code)
  - name: uiExecuteSonar
    type: boolean
    default: false
  - name: uiSonarEndpointName
    type: string
    default: ""
  - name: uiUseSonarCloud
    type: boolean
    default: false
  - name: uiSonarCloudOrganization
    type: string
    default: ""
  - name: uiSonarConfigFile
    type: string
    default: "sonar-project.properties"

  # Docker Settings - one entry per container image to build & push.
  # Each entry: { name, dockerImageName, dockerFilePath, artifactName, artifactZipName, imageTagVariableName }
  #   name                  - unique job identifier within docker_publish stage (alphanumeric + underscore).
  #   artifactName / artifactZipName must match a publishProjects entry.
  #   imageTagVariableName  - the helmfile-config variable to bump.
  - name: buildAndPublishDockerImages
    type: boolean
    default: false
  - name: dockerImages
    type: object
    default: []
  - name: containerRegistryName
    type: string
    default: proget_docker

  # Helmfile Config Settings
  - name: updateHelmConfig
    type: boolean
    default: false
  - name: helmfileRepoName
    type: string
    default: ""
  # Comma-separated tag assignments for the helmfile-config repo.
  # Example: "identityImageTag=$(build.buildnumber),adminApiImageTag=$(build.buildnumber)"
  # A single commit updates every listed tag atomically.
  - name: helmTagsCollection
    type: string
    default: ""

  # Stage wiring. These let a consumer splice externally-defined stages (e.g. an
  # integration-test stage from another template) into the serial chain by
  # re-pointing what the built-in stages wait on. Defaults reproduce the
  # standalone order: Build -> docker_publish -> updateHelmConfig.
  # Example (gate images + deploy on a separately-composed `integration_tests`
  # stage): dockerPublishDependsOn: [integration_tests]
  - name: dockerPublishDependsOn
    type: object
    default:
      - Build
  - name: updateHelmConfigDependsOn
    type: object
    default:
      - docker_publish

  # Hooks
  - name: prebuildSteps
    type: stepList
    default: []
  - name: preTestSteps
    type: stepList
    default: []
  - name: setupSteps
    type: stepList
    default: []

stages:
  - stage: Build
    jobs:
      - job: BuildJob
        workspace:
          clean: all
        pool:
          name: Default
          demands: agent.os -equals Linux
        steps:
          - checkout: self
            fetchDepth: 0
            clean: true
            persistCredentials: true

          - ${{ parameters.setupSteps }}

          - task: gitversion/setup@3
            displayName: Setup GitVersion on Agent
            inputs:
              versionSpec: ${{ parameters.gitVersionSpec }}
          - task: gitversion/execute@3
            displayName: Execute GitVersion to update build number

          - ${{ if eq(parameters.uiEnabled, true) }}:
              - template: ../../step_collections/yarn-build-test/v1.yml
                parameters:
                  nodeVersion: ${{ parameters.uiNodeVersion }}
                  zipBuildArtifacts: false
                  workingDir: ${{ parameters.uiSourceDirectory }}
                  useYarn2: ${{ parameters.uiUseYarn2 }}
                  executeSonar: ${{ parameters.uiExecuteSonar }}
                  sonarEndpointName: ${{ parameters.uiSonarEndpointName }}
                  useSonarCloud: ${{ parameters.uiUseSonarCloud }}
                  sonarCloudOrganization: ${{ parameters.uiSonarCloudOrganization }}
                  sonar_config_file: ${{ parameters.uiSonarConfigFile }}
                  codeCoverageFile: ${{ parameters.uiCodeCoverageFile }}
                  unitTestFile: ${{ parameters.uiUnitTestFile }}

          - template: ../../step_collections/dotnet-multi-publish-build-steps/v1.yml
            parameters:
              buildProject: ${{ parameters.buildProject }}
              publishProjects: ${{ parameters.publishProjects }}
              netCoreVersion: ${{ parameters.netCoreVersion }}
              buildConfiguration: ${{ parameters.buildConfiguration }}
              externalFeedCredentials: ${{ parameters.externalFeedCredentials }}
              prebuildSteps: ${{ parameters.prebuildSteps }}
              preTestSteps: ${{ parameters.preTestSteps }}
              executeSonar: ${{ parameters.executeSonar }}
              sonarEndpointName: ${{ parameters.sonarEndpointName }}
              sonarProjectKey: ${{ parameters.sonarProjectKey }}
              sonarProjectName: ${{ parameters.sonarProjectName }}
              executeTests: ${{ parameters.executeTests }}
              testProjects: ${{ parameters.testProjects }}
              useSonarCloud: ${{ parameters.useSonarCloud }}
              sonarCloudOrganization: ${{ parameters.sonarCloudOrganization }}
              sonarExtraProperties: ${{ parameters.sonarExtraProperties }}

          - ${{ if eq(parameters.publishToNuget, true) }}:
              - task: DotNetCoreCLI@2
                displayName: Pack NuGet packages
                inputs:
                  command: pack
                  packagesToPack: ${{ parameters.projectsToPack }}
                  packDirectory: "$(Build.ArtifactStagingDirectory)/nuget"
                  arguments: "--no-restore --no-build --configuration ${{ parameters.buildConfiguration }}"
                  versioningScheme: byEnvVar
                  versionEnvVar: "GitVersion.SemVer"
              - publish: "$(Build.ArtifactStagingDirectory)/nuget"
                artifact: "nuget-packages"
                displayName: Upload NuGet packages artifact
              - task: DotNetCoreCLI@2
                displayName: Push NuGet packages
                inputs:
                  command: custom
                  custom: nuget
                  arguments: >
                    push $(Build.ArtifactStagingDirectory)/nuget/*.nupkg
                    -s ${{ parameters.externalPublishUrl }}
                    -k ${{ parameters.externalPublishApiKey }}

  - ${{ if eq(parameters.buildAndPublishDockerImages, true) }}:
      - stage: docker_publish
        displayName: Create Docker Images
        dependsOn: ${{ parameters.dockerPublishDependsOn }}
        variables:
          - name: DOCKER_BUILDKIT
            value: 1
        jobs:
          - ${{ each img in parameters.dockerImages }}:
              - template: ../../jobs/build-docker-image/v1.yml
                parameters:
                  jobName: build_${{ img.name }}
                  jobDisplayName: "Build & Push ${{ img.dockerImageName }}"
                  dockerImageName: ${{ img.dockerImageName }}
                  containerRegistryName: ${{ parameters.containerRegistryName }}
                  artifactName: ${{ img.artifactName }}
                  artifactZipName: ${{ img.artifactZipName }}
                  dockerFilePath: ${{ img.dockerFilePath }}

  - ${{ if eq(parameters.updateHelmConfig, true) }}:
      - stage: updateHelmConfig
        displayName: Update Helm Config Repository
        dependsOn: ${{ parameters.updateHelmConfigDependsOn }}
        jobs:
          - job: updateHelmConfigJob
            pool:
              name: Default
            workspace:
              clean: all
            steps:
              - template: ../../step_collections/process-cicd-script/v1.yml
                parameters:
                  repositoryResource: ${{ parameters.helmfileRepoName }}
                  branchName: $(Build.SourceBranch)
                  tagsCollection: ${{ parameters.helmTagsCollection }}
                  commitMessage: Updated image tags to $(build.buildnumber)
