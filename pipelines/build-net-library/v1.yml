parameters:
  - name: buildConfiguration
    default: "Release"
    type: string
  - name: dotnetSdk
    type: string
    default: "8.0.x"
  - name: projectsToBuild
    type: string
    default: "**/*.csproj"
  - name: projectsToPack
    type: string
    default: "**/*.csproj"
  - name: buildArtifactName
    type: string
    default: packages

  - name: executeGitVersion
    type: boolean
    default: true
  - name: gitVersionVersion
    type: string
    default: "6.0.x"

  # Nuget Restore
  - name: projectsToRestore
    type: string
    default: "**/*.csproj"
  - name: nugetConfigPath
    type: string
    default: ""
  - name: externalNugetFeed
    type: string
    default: "SpydersoftDevelop"

  # Nuget Publish
  - name: publishToNuget
    type: boolean
    default: true
  - name: externalPublishUrl
    type: string
    default: ""
  - name: externalPublishApiKey
    type: string
    default: ""

  # Unit Testing
  - name: executeTests
    type: boolean
    default: false
  - name: testProjects
    type: string
    default: "**/*.UnitTests/*.csproj"

  # SonarQube/SonarCloud Scanning
  - name: executeSonar
    type: boolean
    default: false
  - name: useSonarCloud
    type: boolean
    default: true
  - name: sonarCloudOrganization
    type: string
    default: "spydersoft-consulting"
  - name: sonarExtraProperties
    type: string
    default: ""
  - name: sonarEndpointName
    type: string
    default: ""
  - name: sonarProjectKey
    type: string
    default: ""
  - name: sonarProjectName
    type: string
    default: ""
  - name: additionalNetVersions
    type: object
    default: []

  # Hooks
  - name: prebuildSteps
    type: stepList
    default: []
  - name: preTestSteps
    type: stepList
    default: []

  # Pool selection: set vmImage to run on a Microsoft-hosted agent (e.g.
  # "ubuntu-latest"); leave it empty (the default) to use the self-hosted
  # poolName pool instead. vmImage takes precedence when both are set.
  - name: poolName
    type: string
    default: Default
  - name: vmImage
    type: string
    default: ""

jobs:
  - job: "librarybuild"
    displayName: ".NET Library build"
    pool:
      ${{ if ne(parameters.vmImage, '') }}:
        vmImage: ${{ parameters.vmImage }}
      ${{ else }}:
        name: ${{ parameters.poolName }}
    steps:
      - checkout: self
        fetchDepth: 0
        clean: true
      - task: UseDotNet@2
        displayName: "Use .NET Core sdk"
        inputs:
          packageType: sdk
          version: ${{ parameters.dotnetSdk }}

      - ${{ each version in parameters.additionalNetVersions }}:
          - task: UseDotNet@2
            displayName: "Use .NET Core sdk ${{ version }}"
            inputs:
              packageType: sdk
              version: ${{ version }}

      - ${{ if eq(parameters.executeGitVersion, true) }}:
          - task: gitversion/setup@3
            displayName: Setup GitVersion on Agent
            inputs:
              versionSpec: "${{ parameters.gitVersionVersion }}"
          - task: gitversion/execute@3
            displayName: Execute GitVersion to update build number

      - ${{ if eq(parameters.executeSonar, true) }}:
          - ${{ if eq(parameters.useSonarcloud, true) }}:
              # Prepare Analysis Configuration task
              - task: SonarCloudPrepare@3
                inputs:
                  SonarCloud: ${{ parameters.sonarEndpointName }}
                  organization: ${{ parameters.sonarCloudOrganization }}
                  scannerMode: "dotnet"
                  projectKey: ${{ parameters.sonarProjectKey }}
                  projectName: ${{ parameters.sonarProjectName }}
                  extraProperties: |
                    sonar.cs.opencover.reportsPaths="$(Agent.TempDirectory)/ResultFiles/**/coverage.opencover.xml"
                    ${{ parameters.sonarExtraProperties }}
          - ${{ else }}:
              # Prepare Analysis Configuration task
              - task: SonarQubePrepare@5
                inputs:
                  SonarQube: ${{ parameters.sonarEndpointName }}
                  scannerMode: "MSBuild"
                  projectKey: ${{ parameters.sonarProjectKey }}
                  projectName: ${{ parameters.sonarProjectName }}
                  extraProperties: |
                    sonar.cs.opencover.reportsPaths="$(Agent.TempDirectory)/ResultFiles/**/coverage.opencover.xml"

      - ${{ parameters.prebuildSteps }}

      - task: NuGetAuthenticate@1
        inputs:
          nuGetServiceConnections: ${{ parameters.externalNugetFeed }}

      - ${{ if ne(parameters.nugetConfigPath, '') }}:
          - task: DotNetCoreCLI@2
            displayName: "DotNet restore packages (dotnet restore)"
            inputs:
              command: "restore"
              projects: ${{ parameters.projectsToRestore }}
              feedsToUse: "config"
              nugetConfigPath: ${{ parameters.nugetConfigPath }}
      - ${{ else }}:
          - task: DotNetCoreCLI@2
            displayName: "DotNet restore packages (dotnet restore)"
            inputs:
              command: "restore"
              projects: ${{ parameters.projectsToRestore }}

      - task: DotNetCoreCLI@2
        displayName: Build (dotnet build)
        inputs:
          command: build
          projects: ${{ parameters.projectsToBuild }}
          arguments: "--no-restore --configuration ${{ parameters.buildConfiguration }} /p:Version=$(NugetVersion) /p:InformationalVersion=$(fullSemVer) /p:AssemblyVersion=$(AssemblySemVer) /p:AssemblyFileVersion=$(AssemblySemFileVer)"

      - ${{ if eq(parameters.executeTests, true) }}:
          - ${{ parameters.preTestSteps }}

          - task: DotNetCoreCLI@2
            displayName: Test (dotnet test)
            inputs:
              command: test
              projects: ${{ parameters.testProjects}}
              publishTestResults: false
              arguments: '--no-restore --configuration ${{ parameters.buildConfiguration }} --logger trx --results-directory "$(Agent.TempDirectory)"'

          - pwsh: |
              Push-Location $(Agent.TempDirectory);
              if (Test-Path "ResultFiles")
              {
                  Remove-Item "ResultFiles" -Recurse -Force;
              }
              $null = New-Item -ItemType Directory -Path "ResultFiles";
              $resultFilesPath = Join-Path (Get-Location) "ResultFiles";

              # Legacy layout (pre-.NET 10 SDK 10.0.300): coverage attachments organized into
              # {trxname}/In/{machine}/coverage.*.xml alongside the trx file.
              $copiedLegacy = $false;
              $trxFiles = Get-ChildItem *.trx;
              foreach ($trxFile in $trxFiles)
              {
                  $trxFileName = [System.IO.Path]::GetFileNameWithoutExtension($trxFile);
                  $copyPath = [System.IO.Path]::Combine($trxFile.Directory, $trxFileName);

                  Write-Host "Processing $copyPath";
                  if (Test-Path $copyPath)
                  {
                      Copy-Item $copyPath $resultFilesPath -Recurse;
                      $copiedLegacy = $true;
                  }
              }

              # New layout (.NET 10 SDK 10.0.300+ / Microsoft.Testing.Platform):
              # coverage.*.xml is written directly into a GUID-named sibling folder of the trx.
              # Only fall back to this if the legacy layout wasn't found, to avoid duplicating
              # results when both exist.
              if (-not $copiedLegacy)
              {
                  $coverageDirs = Get-ChildItem -Directory | Where-Object {
                      $_.Name -ne 'ResultFiles' -and
                      (Get-ChildItem -Path $_.FullName -Filter 'coverage.*.xml' -File -ErrorAction SilentlyContinue)
                  };
                  foreach ($dir in $coverageDirs)
                  {
                      Write-Host "Processing $($dir.FullName)";
                      Copy-Item $dir.FullName $resultFilesPath -Recurse;
                  }
              }
            displayName: Copy Test Files

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "VSTest"
              testResultsFiles: "$(Agent.TempDirectory)/*.trx"

          - task: PublishCodeCoverageResults@2
            condition: true # always try publish coverage results, even if unit tests fail
            inputs:
              summaryFileLocation: "$(Agent.TempDirectory)/ResultFiles/**/coverage.cobertura.xml"

      - ${{ if eq(parameters.executeSonar, true) }}:
          - ${{ if eq(parameters.useSonarcloud, true) }}:
              # Run Code Analysis task
              - task: SonarCloudAnalyze@3
                inputs:
                  jdkversion: "JAVA_HOME_17_X64"
              # Publish Quality Gate Result task
              - task: SonarCloudPublish@3
                inputs:
                  pollingTimeoutSec: "300"
          - ${{ else }}:
              - powershell: |
                  $params = "$env:SONARQUBE_SCANNER_PARAMS" -replace '"sonar.branch.name":"[\w,/,-]*"\,?'
                  Write-Host "##vso[task.setvariable variable=SONARQUBE_SCANNER_PARAMS]$params"
                displayName: Replace branch name
              # Run Code Analysis task
              - task: SonarQubeAnalyze@5
              # Publish Quality Gate Result task
              - task: SonarQubePublish@5
                inputs:
                  pollingTimeoutSec: "300"

      - task: DotNetCoreCLI@2
        displayName: Pack
        inputs:
          command: pack
          packagesToPack: ${{ parameters.projectsToPack }}
          arguments: "--no-restore --no-build --configuration ${{ parameters.buildConfiguration }} --output $(Build.ArtifactStagingDirectory)"
          versioningScheme: byEnvVar
          versionEnvVar: "GitVersion.SemVer"

      - publish: "$(Build.ArtifactStagingDirectory)"
        artifact: "${{ parameters.buildArtifactName }}"

      - ${{ if eq(parameters.publishToNuget, true) }}:
          - task: DotNetCoreCLI@2
            inputs:
              command: custom
              custom: nuget
              arguments: >
                push $(Build.ArtifactStagingDirectory)/*.nupkg -s ${{ parameters.externalPublishUrl }} -k ${{ parameters.externalPublishApiKey }}
